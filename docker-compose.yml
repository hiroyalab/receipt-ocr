services:
  db:
    image: postgres:16-alpine
    container_name: receipt-ocr-db
    environment:
      POSTGRES_DB: receipt_ocr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: receipt-ocr-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/receipt_ocr
    volumes:
      - paddleocr_models:/root/.paddleocr
    depends_on:
      db:
        condition: service_healthy

  # frontend:
  #   build: ./frontend
  #   container_name: receipt-ocr-frontend
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - backend

volumes:
  postgres_data:
  paddleocr_models:
